apiVersion: apps/v1
kind: Deployment

metadata:
  name: haris-portfolio

spec:
  replicas: 2

  selector:
    matchLabels:
      app: haris-portfolio

  template:
    metadata:
      labels:
        app: haris-portfolio

    spec:
      containers:
      - name: haris-portfolio

        image: haris-portfolio:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 80
